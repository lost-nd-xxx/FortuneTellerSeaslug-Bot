name: YAYA Scheduled Toot
on:
  schedule:
    - cron: '0 0 * * 1,4'    # 月・木 9:00 JST
    - cron: '0 12 * * 2,5'   # 火・金 21:00 JST
    - cron: '0 6 * * 3,6,0'  # 水・土・日 15:00 JST
  workflow_dispatch:
jobs:
  toot:
    runs-on: windows-latest
    timeout-minutes: 5
    env:
      MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
      PYTHONUTF8: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: pip install
        run: pip install -r requirements.txt
      - name: Toot
        run: python main.py yaya
